name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build-macos -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-macos --config Release

      - name: Package
        run: ditto -c -k --keepParent "build-macos/FourTrackTape_artefacts/4-Track.app" "4-Track-macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4-Track-macos
          path: 4-Track-macos.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build-windows

      - name: Build
        run: cmake --build build-windows --config Release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "build-windows/FourTrackTape_artefacts/Release/4-Track.exe" -DestinationPath "4-Track-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4-Track-windows
          path: 4-Track-windows.zip

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            patchelf \
            desktop-file-utils \
            libasound2-dev \
            libjack-jackd2-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Configure
        run: cmake -S . -B build-linux -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-linux

      - name: Download linuxdeploy
        run: |
          curl -L "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" -o linuxdeploy.AppImage
          curl -L "https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage" -o linuxdeploy-plugin-appimage
          chmod +x linuxdeploy.AppImage linuxdeploy-plugin-appimage

      - name: Package AppImage
        run: |
          export PATH="$PWD:$PATH"
          mkdir -p AppDir/usr/bin
          cp "build-linux/FourTrackTape_artefacts/4-Track" "AppDir/usr/bin/4-Track"
          ./linuxdeploy.AppImage --appimage-extract-and-run \
            --appdir AppDir \
            --executable "AppDir/usr/bin/4-Track" \
            --desktop-file "packaging/4-Track.desktop" \
            --icon-file "assets/AppIcon.png" \
            --output appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4-Track-linux
          path: ./*.AppImage
