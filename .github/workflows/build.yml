name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build-macos -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-macos --config Release

      - name: Package
        run: |
          APP_BUNDLE="build-macos/FourTrackTape_artefacts/4-Track.app"
          if [ ! -d "$APP_BUNDLE" ]; then
            APP_BUNDLE="build-macos/FourTrackTape_artefacts/Release/4-Track.app"
          fi
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "Built app bundle not found"
            exit 1
          fi
          ditto -c -k --keepParent "$APP_BUNDLE" "4-Track-macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4-Track-macos
          path: 4-Track-macos.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build-windows

      - name: Build
        run: cmake --build build-windows --config Release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "build-windows/FourTrackTape_artefacts/Release/4-Track.exe" -DestinationPath "4-Track-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4-Track-windows
          path: 4-Track-windows.zip

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            patchelf \
            desktop-file-utils \
            libasound2-dev \
            libjack-jackd2-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Configure
        run: cmake -S . -B build-linux -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-linux

      - name: Download packaging tools
        run: |
          curl -L "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" -o linuxdeploy.AppImage
          curl -L "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -o appimagetool.AppImage
          chmod +x linuxdeploy.AppImage appimagetool.AppImage

      - name: Package AppImage
        run: |
          export PATH="$PWD:$PATH"
          APP_BINARY="build-linux/FourTrackTape_artefacts/4-Track"
          if [ ! -f "$APP_BINARY" ]; then
            APP_BINARY="build-linux/FourTrackTape_artefacts/Release/4-Track"
          fi
          if [ ! -f "$APP_BINARY" ]; then
            echo "Built app not found"
            exit 1
          fi
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          mkdir -p AppDir/usr/share/pixmaps
          cp "$APP_BINARY" "AppDir/usr/bin/4-Track"
          cp "packaging/4-Track.desktop" "AppDir/usr/share/applications/4-Track.desktop"
          cp "packaging/4-Track.desktop" "AppDir/4-Track.desktop"
          cp "assets/AppIcon.png" "AppDir/usr/share/icons/hicolor/512x512/apps/4-Track.png"
          cp "assets/AppIcon.png" "AppDir/usr/share/pixmaps/4-Track.png"
          cp "assets/AppIcon.png" "AppDir/4-Track.png"
          cp "assets/AppIcon.png" "AppDir/.DirIcon"
          ln -sf "usr/bin/4-Track" "AppDir/AppRun"
          ./linuxdeploy.AppImage --appimage-extract-and-run \
            --appdir AppDir \
            --executable "AppDir/usr/bin/4-Track"
          ARCH=x86_64 ./appimagetool.AppImage --appimage-extract-and-run AppDir

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4-Track-linux
          path: ./*.AppImage
